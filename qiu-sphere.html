<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QIU Photo Sphere Test</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000 url("./work-beijing.png") center center / 100% 100% fixed no-repeat;
        color: #eef8ff;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      #qiu-sphere-canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      .debug-panel {
        position: fixed;
        left: 24px;
        top: 24px;
        z-index: 2;
        width: min(320px, calc(100vw - 48px));
        padding: 18px 18px 16px;
        border: 1px solid rgba(145, 210, 255, 0.28);
        background: rgba(4, 10, 24, 0.48);
        backdrop-filter: blur(14px);
        box-shadow: 0 0 28px rgba(79, 180, 255, 0.16);
      }

      .debug-panel h1 {
        margin: 0 0 8px;
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .debug-panel p {
        margin: 0 0 14px;
        color: rgba(238, 248, 255, 0.72);
        font-size: 13px;
        line-height: 1.7;
      }

      .debug-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .debug-actions button {
        min-width: 84px;
        height: 34px;
        border: 1px solid rgba(129, 207, 255, 0.42);
        background: linear-gradient(135deg, rgba(65, 157, 255, 0.22), rgba(153, 80, 255, 0.22));
        color: #eef8ff;
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .debug-actions button:hover {
        box-shadow: 0 0 18px rgba(117, 198, 255, 0.35);
      }

      .debug-status {
        margin-top: 12px;
        color: rgba(175, 220, 255, 0.82);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="qiu-sphere-canvas"></canvas>

    <section class="debug-panel">
      <h1>QIU Photo Sphere</h1>
      <p>独立照片球调试页。图片来自 QIU 文件夹同步生成的安全路径，照片会从四周飞入并贴在球体表面慢慢旋转。</p>
      <div class="debug-actions">
        <button type="button" data-action="form">成球</button>
        <button type="button" data-action="scatter">散开</button>
        <button type="button" data-action="reset">重来</button>
      </div>
      <div class="debug-status" data-status>正在加载照片...</div>
    </section>

    <script src="./js/works-data.js"></script>
    <script src="./js/qiu-sphere.js"></script>
  </body>
</html>
